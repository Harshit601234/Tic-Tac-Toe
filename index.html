<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Tic-Tac-Toe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .cell { transition: all 0.2s ease; }
        .cell:hover:not(:disabled) { transform: scale(1.02); background-color: #f3f4f6; }
        .winner-line { animation: strike 0.5s ease-out forwards; }
        @keyframes strike { from { width: 0; } to { width: 100%; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="app" class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <!-- Join/Create Screen -->
        <div id="setup-screen" class="p-8 space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-extrabold text-slate-900">Tic-Tac-Toe</h1>
                <p class="text-slate-500 mt-2">Enter a Game ID to start playing</p>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="game-id-input" placeholder="Enter Room ID (e.g. fun-game)" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button id="join-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95">
                    Join / Create Game
                </button>
            </div>
            
            <div class="pt-4 border-t border-slate-100">
                <p class="text-xs text-slate-400 text-center">Your User ID: <span id="user-id-display" class="font-mono"></span></p>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden p-6 space-y-6">
            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <div class="text-center">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Room</p>
                    <p id="current-room-display" class="font-bold text-slate-700"></p>
                </div>
                <div class="text-center">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">You Are</p>
                    <p id="player-role-display" class="font-bold text-blue-600">-</p>
                </div>
            </div>

            <div id="status-message" class="text-center font-semibold py-2 px-4 rounded-lg bg-blue-50 text-blue-700">
                Waiting for second player...
            </div>

            <div class="grid grid-cols-3 gap-3 aspect-square">
                <button data-index="0" class="cell aspect-square bg-slate-50 rounded-2xl text-4xl font-extrabold text-slate-700 flex items-center justify-center border-2 border-transparent focus:border-blue-300 outline-none"></button>
                <button data-index="1" class="cell aspect-square bg-slate-50 rounded-2xl text-4xl font-extrabold text-slate-700 flex items-center justify-center border-2 border-transparent focus:border-blue-300 outline-none"></button>
                <button data-index="2" class="cell aspect-square bg-slate-50 rounded-2xl text-4xl font-extrabold text-slate-700 flex items-center justify-center border-2 border-transparent focus:border-blue-300 outline-none"></button>
                <button data-index="3" class="cell aspect-square bg-slate-50 rounded-2xl text-4xl font-extrabold text-slate-700 flex items-center justify-center border-2 border-transparent focus:border-blue-300 outline-none"></button>
                <button data-index="4" class="cell aspect-square bg-slate-50 rounded-2xl text-4xl font-extrabold text-slate-700 flex items-center justify-center border-2 border-transparent focus:border-blue-300 outline-none"></button>
                <button data-index="5" class="cell aspect-square bg-slate-50 rounded-2xl text-4xl font-extrabold text-slate-700 flex items-center justify-center border-2 border-transparent focus:border-blue-300 outline-none"></button>
                <button data-index="6" class="cell aspect-square bg-slate-50 rounded-2xl text-4xl font-extrabold text-slate-700 flex items-center justify-center border-2 border-transparent focus:border-blue-300 outline-none"></button>
                <button data-index="7" class="cell aspect-square bg-slate-50 rounded-2xl text-4xl font-extrabold text-slate-700 flex items-center justify-center border-2 border-transparent focus:border-blue-300 outline-none"></button>
                <button data-index="8" class="cell aspect-square bg-slate-50 rounded-2xl text-4xl font-extrabold text-slate-700 flex items-center justify-center border-2 border-transparent focus:border-blue-300 outline-none"></button>
            </div>

            <div class="flex gap-3">
                <button id="reset-btn" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl transition-all active:scale-95">
                    Reset Game
                </button>
                <button id="leave-btn" class="px-6 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition-all">
                    Leave
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuration provided by environment
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tic-tac-toe-demo';
        const firebaseConfig = JSON.parse(__firebase_config);
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userId = null;
        let currentGameId = null;
        let playerRole = null; // 'X' or 'O'
        let unsubscribe = null;

        // UI Elements
        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        const gameIdInput = document.getElementById('game-id-input');
        const joinBtn = document.getElementById('join-btn');
        const userIdDisplay = document.getElementById('user-id-display');
        const currentRoomDisplay = document.getElementById('current-room-display');
        const playerRoleDisplay = document.getElementById('player-role-display');
        const statusMessage = document.getElementById('status-message');
        const cells = document.querySelectorAll('.cell');
        const resetBtn = document.getElementById('reset-btn');
        const leaveBtn = document.getElementById('leave-btn');

        async function authenticate() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth failed:", err);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userId = user.uid;
                userIdDisplay.textContent = userId;
            }
        });

        async function joinGame() {
            const gameId = gameIdInput.value.trim().toLowerCase();
            if (!gameId) return;

            currentGameId = gameId;
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId);
            
            const gameSnap = await getDoc(gameRef);

            if (!gameSnap.exists()) {
                // Create new game
                const initialData = {
                    board: Array(9).fill(""),
                    playerX: userId,
                    playerO: null,
                    turn: 'X',
                    winner: null,
                    status: 'waiting'
                };
                await setDoc(gameRef, initialData);
                playerRole = 'X';
            } else {
                const data = gameSnap.data();
                if (data.playerX === userId) {
                    playerRole = 'X';
                } else if (data.playerO === userId || !data.playerO) {
                    playerRole = 'O';
                    if (!data.playerO) {
                        await updateDoc(gameRef, { playerO: userId, status: 'playing' });
                    }
                } else {
                    alert("Game is full!");
                    return;
                }
            }

            setupScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            currentRoomDisplay.textContent = gameId;
            playerRoleDisplay.textContent = `Player ${playerRole}`;
            
            startListening(gameId);
        }

        function startListening(gameId) {
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId);
            
            unsubscribe = onSnapshot(gameRef, (doc) => {
                if (!doc.exists()) return;
                const data = doc.data();
                updateUI(data);
            }, (error) => {
                console.error("Snapshot error:", error);
            });
        }

        function updateUI(data) {
            // Update Board
            data.board.forEach((val, i) => {
                cells[i].textContent = val;
                cells[i].className = `cell aspect-square rounded-2xl text-4xl font-extrabold flex items-center justify-center border-2 border-transparent outline-none transition-all ${
                    val === 'X' ? 'text-blue-600 bg-blue-50' : val === 'O' ? 'text-rose-600 bg-rose-50' : 'bg-slate-50'
                }`;
                cells[i].disabled = (val !== "" || data.winner || data.turn !== playerRole || data.status === 'waiting');
            });

            // Update Status
            if (data.status === 'waiting') {
                statusMessage.textContent = "Waiting for Player O...";
                statusMessage.className = "text-center font-semibold py-2 px-4 rounded-lg bg-amber-50 text-amber-700";
            } else if (data.winner) {
                if (data.winner === 'Draw') {
                    statusMessage.textContent = "It's a Draw!";
                    statusMessage.className = "text-center font-semibold py-2 px-4 rounded-lg bg-slate-100 text-slate-700";
                } else {
                    const isYou = data.winner === playerRole;
                    statusMessage.textContent = isYou ? "You Won! 🎉" : "Opponent Won!";
                    statusMessage.className = `text-center font-semibold py-2 px-4 rounded-lg ${isYou ? 'bg-green-100 text-green-700' : 'bg-rose-100 text-rose-700'}`;
                }
            } else {
                const isYourTurn = data.turn === playerRole;
                statusMessage.textContent = isYourTurn ? "Your Turn" : "Opponent's Turn...";
                statusMessage.className = `text-center font-semibold py-2 px-4 rounded-lg ${isYourTurn ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-600'}`;
            }
        }

        async function makeMove(index) {
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', currentGameId);
            const gameSnap = await getDoc(gameRef);
            const data = gameSnap.data();

            if (data.board[index] !== "" || data.winner || data.turn !== playerRole || data.status !== 'playing') return;

            const newBoard = [...data.board];
            newBoard[index] = playerRole;

            const winner = checkWinner(newBoard);
            const isDraw = !winner && newBoard.every(c => c !== "");

            await updateDoc(gameRef, {
                board: newBoard,
                turn: playerRole === 'X' ? 'O' : 'X',
                winner: winner || (isDraw ? 'Draw' : null)
            });
        }

        function checkWinner(board) {
            const lines = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
                [0, 4, 8], [2, 4, 6]             // Diagonals
            ];
            for (let line of lines) {
                const [a, b, c] = line;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            return null;
        }

        async function resetGame() {
            if (!currentGameId) return;
            const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', currentGameId);
            await updateDoc(gameRef, {
                board: Array(9).fill(""),
                turn: 'X',
                winner: null
            });
        }

        joinBtn.addEventListener('click', joinGame);
        resetBtn.addEventListener('click', resetGame);
        leaveBtn.addEventListener('click', () => {
            if (unsubscribe) unsubscribe();
            setupScreen.classList.remove('hidden');
            gameScreen.classList.add('hidden');
        });

        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                const index = cell.getAttribute('data-index');
                makeMove(parseInt(index));
            });
        });

        window.onload = authenticate;
    </script>
</body>
</html>
