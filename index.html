<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .cell { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .cell:hover:not(:disabled) { transform: scale(1.02); background-color: #f8fafc; }
        .cell:active:not(:disabled) { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="app" class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
        
        <!-- Setup Screen -->
        <div id="setup-screen" class="p-8 space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Tic-Tac-Toe</h1>
                <p class="text-slate-500 mt-1">Real-time Multiplayer</p>
            </div>
            
            <div id="auth-status" class="text-xs font-medium text-center p-3 rounded-xl bg-blue-50 text-blue-600 border border-blue-100">
                ⚡ Initializing connection...
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1 ml-1">Room Name</label>
                    <input type="text" id="game-id-input" placeholder="e.g. secret-room-123" 
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all" disabled>
                </div>
                <button id="join-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Join or Create Room
                </button>
            </div>

            <div class="mt-8 border-t border-slate-100 pt-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider">Available Rooms</h2>
                    <span id="rooms-count" class="text-xs font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded-md">0</span>
                </div>
                <div id="rooms-list" class="space-y-2 max-h-48 overflow-y-auto pr-1">
                    <div class="text-xs text-slate-400 text-center py-4 bg-slate-50 rounded-xl border border-dashed border-slate-200">
                        Loading rooms...
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden p-6 space-y-6">
            <div class="flex justify-between items-center text-xs font-bold uppercase tracking-widest text-slate-400">
                <span id="room-id-display" class="bg-slate-100 px-3 py-1 rounded-full"></span>
                <span id="role-display" class="px-3 py-1 rounded-full"></span>
            </div>

            <div id="status-message" class="text-center py-4 text-lg font-bold rounded-2xl bg-slate-50 border border-slate-100 transition-all">
                Loading game...
            </div>

            <!-- The Grid -->
            <div id="board" class="grid grid-cols-3 gap-3 aspect-square">
                <!-- Cells generated dynamically -->
            </div>

            <div class="pt-4 space-y-3">
                <button id="reset-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all hidden">
                    New Round
                </button>
                <button id="leave-btn" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition-all">
                    Exit Lobby
                </button>
            </div>
        </div>
    </div>

    <footer class="mt-8 flex items-center gap-2 text-slate-400 text-xs font-medium tracking-tight">
        <span>Made by</span>
        <a href="https://github.com/Harshit-code07" target="_blank" 
           class="group relative flex items-center gap-1.5 transition-all duration-300">
            <!-- GitHub Icon using SVG -->
            <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-900 transition-colors" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.412-4.041-1.412-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            <span class="bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent font-bold tracking-normal group-hover:from-blue-500 group-hover:to-indigo-500 transition-all">
                Harshit
            </span>
            <!-- Modern animated underline -->
            <span class="absolute -bottom-1 left-5 w-0 h-0.5 bg-gradient-to-r from-blue-600 to-indigo-600 transition-all duration-300 group-hover:w-[calc(100%-1.25rem)]"></span>
        </a>
    </footer>

    <script>
        const SUPABASE_URL = 'https://xhdvsrpediosbblvbgbo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoZHZzcnBlZGlvc2JibHZiZ2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDU2NTgsImV4cCI6MjA5NDQyMTY1OH0.LNw9DuCD5EBBD0h2Y6UYYkZlUSZbewLk9d8UCje88OM';
        
        // FIXED: Renamed variable to avoid collision with global 'supabase' object
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myUserId = null;
        let currentGameId = null;
        let myRole = null; 
        let gameSubscription = null;
        let roomsSubscription = null;
        let availableRooms = [];

        async function start() {
            const statusDiv = document.getElementById('auth-status');
            try {
                // 1. Authenticate
                const { data, error } = await _supabase.auth.signInAnonymously();
                
                if (error) {
                    throw new Error("Authentication failed: " + error.message);
                }
                
                myUserId = data.user.id;
                
                // 2. Unlock UI
                statusDiv.innerText = "✅ Ready to Play";
                statusDiv.className = "text-xs font-medium text-center p-3 rounded-xl bg-green-50 text-green-600 border border-green-100";
                
                document.getElementById('game-id-input').disabled = false;
                document.getElementById('join-btn').disabled = false;

                await fetchAvailableRooms();
                subscribeToRooms();

                // Bind buttons
                document.getElementById('join-btn').onclick = joinGame;
                document.getElementById('leave-btn').onclick = () => window.location.reload();
                document.getElementById('reset-btn').onclick = resetGame;

            } catch (err) {
                console.error(err);
                statusDiv.innerHTML = `❌ Error: ${err.message}<br><small class="opacity-75">Check if 'Anonymous Auth' is enabled in Supabase Settings.</small>`;
                statusDiv.className = "text-xs font-medium text-center p-3 rounded-xl bg-red-50 text-red-600 border border-red-100";
            }
        }

        async function fetchAvailableRooms() {
            const { data, error } = await _supabase
                .from('games')
                .select('*')
                .eq('status', 'waiting');
                
            if (data) {
                availableRooms = data;
                renderAvailableRooms();
            }
        }

        function subscribeToRooms() {
            roomsSubscription = _supabase.channel('public:games')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'games' }, payload => {
                    if (payload.eventType === 'INSERT') {
                        if (payload.new.status === 'waiting') {
                            availableRooms.push(payload.new);
                        }
                    } else if (payload.eventType === 'DELETE') {
                        availableRooms = availableRooms.filter(r => r.id !== payload.old.id);
                    } else if (payload.eventType === 'UPDATE') {
                        const index = availableRooms.findIndex(r => r.id === payload.new.id);
                        if (payload.new.status === 'waiting') {
                            if (index === -1) availableRooms.push(payload.new);
                            else availableRooms[index] = payload.new;
                        } else {
                            // Room is no longer waiting (someone joined or game ended)
                            if (index !== -1) availableRooms.splice(index, 1);
                        }
                    }
                    renderAvailableRooms();
                })
                .subscribe();
        }

        function renderAvailableRooms() {
            const list = document.getElementById('rooms-list');
            const count = document.getElementById('rooms-count');
            count.innerText = availableRooms.length;

            if (availableRooms.length === 0) {
                list.innerHTML = `<div class="text-xs text-slate-400 text-center py-4 bg-slate-50 rounded-xl border border-dashed border-slate-200">No open rooms right now.<br>Create one above!</div>`;
                return;
            }
            
            list.innerHTML = availableRooms.map(room => {
                const isCreator = room.player_x === myUserId;
                return `
                    <div class="flex items-center justify-between p-3 rounded-xl border border-slate-100 bg-white hover:border-blue-100 hover:shadow-sm transition-all group">
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-slate-700">${room.id}</span>
                            <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Waiting for Player</span>
                        </div>
                        <div class="flex items-center gap-2">
                            ${isCreator ? `
                                <button onclick="deleteRoom('${room.id}')" class="p-2 text-rose-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-colors" title="Delete Room">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                                <button onclick="joinSpecificRoom('${room.id}')" class="px-3 py-1.5 text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors">Re-join</button>
                            ` : `
                                <button onclick="joinSpecificRoom('${room.id}')" class="px-3 py-1.5 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md shadow-blue-200 transition-colors">Join</button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function deleteRoom(id) {
            // Optimistically update the UI to make it feel instant
            availableRooms = availableRooms.filter(r => r.id !== id);
            renderAvailableRooms();
            
            // Delete from Supabase
            await _supabase.from('games').delete().eq('id', id);
        }

        function joinSpecificRoom(id) {
            document.getElementById('game-id-input').value = id;
            joinGame();
        }

        async function joinGame() {
            const input = document.getElementById('game-id-input').value.trim();
            if (!input) return;
            
            const gameId = input.toLowerCase();
            currentGameId = gameId;

            try {
                const { data: game, error } = await _supabase
                    .from('games')
                    .select('*')
                    .eq('id', gameId)
                    .maybeSingle();

                if (error) throw error;

                if (!game) {
                    // Create game
                    const { error: insErr } = await _supabase.from('games').insert({ 
                        id: gameId, 
                        player_x: myUserId, 
                        status: 'waiting',
                        board: Array(9).fill(""),
                        turn: 'X'
                    });
                    if (insErr) throw insErr;
                    myRole = 'X';
                } else {
                    // Join existing
                    if (game.player_x === myUserId) {
                        myRole = 'X';
                    } else if (!game.player_o || game.player_o === myUserId) {
                        myRole = 'O';
                        await _supabase.from('games').update({ 
                            player_o: myUserId, 
                            status: 'playing' 
                        }).eq('id', gameId);
                    } else {
                        return alert("Room is full!");
                    }
                }

                showGameUI();
                listenForMoves();
                refreshState();

            } catch (err) {
                alert("Database Error: " + err.message + "\nMake sure you created the 'games' table in Supabase SQL Editor!");
            }
        }

        function listenForMoves() {
            if (gameSubscription) _supabase.removeChannel(gameSubscription);

            gameSubscription = _supabase
                .channel(`game:${currentGameId}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'games', 
                    filter: `id=eq.${currentGameId}` 
                }, (payload) => {
                    updateBoardUI(payload.new);
                })
                .subscribe();
        }

        async function refreshState() {
            const { data } = await _supabase.from('games').select('*').eq('id', currentGameId).single();
            if (data) updateBoardUI(data);
        }

        async function makeMove(idx, board, turn) {
            if (turn !== myRole || board[idx] !== "") return;
            
            const nextBoard = [...board];
            nextBoard[idx] = myRole;
            
            const winner = checkWin(nextBoard);
            const nextTurn = myRole === 'X' ? 'O' : 'X';
            
            await _supabase.from('games').update({ 
                board: nextBoard, 
                turn: nextTurn,
                status: winner ? 'finished' : 'playing',
                winner: winner || null
            }).eq('id', currentGameId);
        }

        function checkWin(b) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let [a,b1,c] of lines) {
                if (b[a] && b[a] === b[b1] && b[a] === b[c]) return b[a];
            }
            return b.includes("") ? null : "Draw";
        }

        async function resetGame() {
            await _supabase.from('games').update({
                board: Array(9).fill(""),
                turn: 'X',
                status: 'playing',
                winner: null
            }).eq('id', currentGameId);
        }

        function updateBoardUI(game) {
            const container = document.getElementById('board');
            container.innerHTML = '';
            
            game.board.forEach((val, i) => {
                const b = document.createElement('button');
                b.className = `cell h-full w-full bg-white border border-slate-200 rounded-2xl text-4xl font-black shadow-sm flex items-center justify-center`;
                if (val === 'X') b.classList.add('text-blue-500');
                if (val === 'O') b.classList.add('text-rose-500');
                b.innerText = val;
                
                const myTurn = game.turn === myRole && game.status === 'playing';
                b.disabled = val !== "" || !myTurn;
                b.onclick = () => makeMove(i, game.board, game.turn);
                container.appendChild(b);
            });

            const msg = document.getElementById('status-message');
            const reset = document.getElementById('reset-btn');

            if (game.status === 'waiting') {
                msg.innerText = "⌛ Waiting for Opponent...";
                msg.className = "text-center py-4 text-lg font-bold rounded-2xl bg-amber-50 text-amber-600 border border-amber-100";
            } else if (game.status === 'finished') {
                reset.classList.remove('hidden');
                if (game.winner === 'Draw') msg.innerText = "🤝 Draw!";
                else msg.innerText = game.winner === myRole ? "🏆 You Won!" : "💀 You Lost!";
                msg.className = "text-center py-4 text-lg font-bold rounded-2xl bg-slate-800 text-white";
            } else {
                reset.classList.add('hidden');
                msg.innerText = game.turn === myRole ? "🎯 Your Turn" : "⏳ Opponent's Turn";
                msg.className = game.turn === myRole ? 
                    "text-center py-4 text-lg font-bold rounded-2xl bg-blue-50 text-blue-600 border border-blue-200" : 
                    "text-center py-4 text-lg font-bold rounded-2xl bg-slate-50 text-slate-400 border border-slate-100";
            }
        }

        function showGameUI() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('room-id-display').innerText = `ROOM: ${currentGameId}`;
            const role = document.getElementById('role-display');
            role.innerText = `YOU: ${myRole}`;
            role.className = `px-3 py-1 rounded-full text-white ${myRole === 'X' ? 'bg-blue-500' : 'bg-rose-500'}`;
        }

        // Start the engine
        window.onload = start;
    </script>
</body>
</html>
