<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X ✕ O — Multiplayer</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a28;
      --border: #2a2a40;
      --accent: #00ff88;
      --accent2: #ff3366;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --x-color: #ff3366;
      --o-color: #00ccff;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Space Mono', monospace;
    }

    html, body, #root { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); }

    .app {
      min-height: 100vh; display: flex; flex-direction: column;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(0,255,136,0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(255,51,102,0.05) 0%, transparent 55%);
    }

    /* ── AUTH ── */
    .auth-screen { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .auth-card {
      background:var(--surface); border:1px solid var(--border); border-radius:2px;
      padding:3rem; width:100%; max-width:420px; position:relative; overflow:hidden;
    }
    .auth-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
    }
    .logo {
      font-family:var(--font-display); font-size:4.5rem; letter-spacing:0.05em; line-height:1; margin-bottom:0.2rem;
      background:linear-gradient(135deg,var(--accent) 0%,#00ccff 50%,var(--accent2) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .logo-sub { font-size:0.6rem; letter-spacing:0.35em; color:var(--muted); text-transform:uppercase; margin-bottom:2.5rem; }

    .auth-tabs { display:flex; margin-bottom:2rem; border-bottom:1px solid var(--border); }
    .auth-tab {
      font-family:var(--font-body); font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase;
      background:none; border:none; border-bottom:2px solid transparent; color:var(--muted);
      cursor:pointer; padding:0.6rem 1.25rem; margin-bottom:-1px; transition:all 0.2s; flex:1; text-align:center;
    }
    .auth-tab:hover { color:var(--text); }
    .auth-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

    .field-label { font-size:0.62rem; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase; margin-bottom:0.45rem; display:block; }
    .field-group { margin-bottom:1.1rem; }
    input.field {
      width:100%; background:var(--bg); border:1px solid var(--border); border-radius:2px;
      color:var(--text); font-family:var(--font-body); font-size:0.85rem;
      padding:0.7rem 1rem; outline:none; transition:border-color 0.2s;
    }
    input.field:focus { border-color:var(--accent); }

    .btn {
      font-family:var(--font-body); font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase;
      border:none; border-radius:2px; padding:0.75rem 1.5rem; cursor:pointer; transition:all 0.15s; white-space:nowrap;
    }
    .btn-primary { background:var(--accent); color:#000; font-weight:700; }
    .btn-primary:hover { background:#00e07a; transform:translateY(-1px); }
    .btn-primary:disabled { opacity:0.35; cursor:not-allowed; transform:none; }
    .btn-secondary { background:transparent; color:var(--text); border:1px solid var(--border); }
    .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
    .btn-danger { background:transparent; color:var(--accent2); border:1px solid var(--accent2); }
    .btn-danger:hover { background:rgba(255,51,102,0.1); }
    .btn-sm { padding:0.38rem 0.75rem; font-size:0.67rem; }
    .btn-icon { background:none; border:none; cursor:pointer; color:var(--muted); font-size:0.95rem; padding:0.25rem; transition:color 0.15s; line-height:1; }
    .btn-icon:hover { color:var(--accent2); }

    .error-box {
      background:rgba(255,51,102,0.08); border:1px solid rgba(255,51,102,0.3); border-radius:2px;
      color:var(--accent2); font-size:0.72rem; padding:0.6rem 0.85rem; margin-bottom:1rem; letter-spacing:0.03em;
    }

    /* ── LOBBY ── */
    .lobby { flex:1; display:flex; flex-direction:column; max-width:880px; width:100%; margin:0 auto; padding:1.5rem; }
    .lobby-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid var(--border);
      flex-wrap:wrap; gap:0.75rem;
    }
    .lobby-title { font-family:var(--font-display); font-size:2.5rem; letter-spacing:0.05em; color:var(--accent); }
    .player-badge { display:flex; align-items:center; gap:0.75rem; }
    .player-badge-inner {
      display:flex; align-items:center; gap:0.6rem;
      background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:0.45rem 0.9rem;
    }
    .player-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; flex-shrink:0; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

    .create-room-bar { display:flex; gap:0.75rem; align-items:center; margin-bottom:1.25rem; }

    /* ── TABS ── */
    .tabs { display:flex; margin-bottom:1rem; border-bottom:1px solid var(--border); overflow-x:auto; }
    .tab {
      font-family:var(--font-body); font-size:0.67rem; letter-spacing:0.12em; text-transform:uppercase;
      background:none; border:none; border-bottom:2px solid transparent; color:var(--muted);
      cursor:pointer; padding:0.7rem 1rem; margin-bottom:-1px; transition:all 0.2s;
      display:flex; align-items:center; gap:0.45rem; white-space:nowrap; flex-shrink:0;
    }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-badge {
      background:var(--surface2); border-radius:10px; font-size:0.62rem;
      padding:0.1rem 0.4rem; min-width:1.1rem; text-align:center;
    }
    .tab.active .tab-badge { background:rgba(0,255,136,0.15); color:var(--accent); }

    /* ── ROOM LIST ── */
    .rooms-list { display:flex; flex-direction:column; gap:0.45rem; }
    .room-card {
      background:var(--surface); border:1px solid var(--border); border-radius:2px;
      padding:0.9rem 1.1rem; display:flex; align-items:center; gap:0.9rem;
      transition:border-color 0.2s, background 0.2s; position:relative; overflow:hidden;
    }
    .room-card:hover { border-color:rgba(0,255,136,0.25); background:rgba(255,255,255,0.01); }
    .room-card.is-mine { border-color:rgba(0,255,136,0.18); }
    .room-card.is-mine::before { content:''; position:absolute; left:0;top:0;bottom:0; width:2px; background:var(--accent); }
    .room-card.ready::before { content:''; position:absolute; left:0;top:0;bottom:0; width:2px; background:var(--accent); }
    .room-card.inactive::before { content:''; position:absolute; left:0;top:0;bottom:0; width:2px; background:var(--muted); }
    .room-id { font-family:var(--font-display); font-size:1.4rem; letter-spacing:0.12em; color:var(--accent); min-width:3.5rem; }
    .room-info { flex:1; min-width:0; }
    .room-name { font-size:0.82rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .room-meta { font-size:0.67rem; color:var(--muted); letter-spacing:0.04em; margin-top:0.18rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .room-status { font-size:0.62rem; letter-spacing:0.18em; text-transform:uppercase; padding:0.22rem 0.55rem; border-radius:2px; border:1px solid; flex-shrink:0; }
    .s-ready    { color:var(--accent); border-color:rgba(0,255,136,0.4); background:rgba(0,255,136,0.06); }
    .s-inactive { color:var(--muted);  border-color:var(--border); }
    .s-playing  { color:var(--o-color); border-color:rgba(0,204,255,0.4); background:rgba(0,204,255,0.06); }
    .s-mine     { color:#ffcc44; border-color:rgba(255,204,68,0.4); background:rgba(255,204,68,0.06); }
    .room-actions { display:flex; gap:0.4rem; align-items:center; flex-shrink:0; }

    .empty-state { text-align:center; padding:3rem 1rem; color:var(--muted); font-size:0.75rem; letter-spacing:0.12em; }
    .empty-icon  { font-size:2.5rem; margin-bottom:0.75rem; opacity:0.25; }

    /* ── GAME ── */
    .game-room { flex:1; display:flex; flex-direction:column; align-items:center; padding:1.5rem; }
    .game-header { width:100%; max-width:520px; display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
    .room-code { font-family:var(--font-display); font-size:1.7rem; letter-spacing:0.1em; color:var(--muted); }
    .room-code span { color:var(--accent); }
    .players-display {
      width:100%; max-width:520px; display:flex; align-items:center; justify-content:space-between;
      margin-bottom:1.25rem; background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:0.9rem 1.25rem;
    }
    .player-slot { display:flex; flex-direction:column; align-items:center; gap:0.2rem; min-width:100px; }
    .player-symbol { font-family:var(--font-display); font-size:2.5rem; line-height:1; }
    .x-symbol { color:var(--x-color); }
    .o-symbol { color:var(--o-color); }
    .pname { font-size:0.73rem; letter-spacing:0.04em; color:var(--text); max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pname.you { color:var(--accent); }
    .pname.waiting { color:var(--muted); font-style:italic; }
    .vs-divider { font-family:var(--font-display); font-size:1.4rem; color:var(--border); letter-spacing:0.1em; }

    /* ── BOARD ── */
    .board {
      display:grid; grid-template-columns:repeat(3,1fr); gap:5px;
      background:var(--border); padding:5px; border-radius:4px;
      width:min(80vw,340px); height:min(80vw,340px); margin-bottom:1.25rem;
    }
    .cell {
      background:var(--surface); border-radius:2px; display:flex; align-items:center; justify-content:center;
      font-family:var(--font-display); font-size:clamp(2.8rem,11vw,4.5rem);
      cursor:pointer; transition:background 0.12s; user-select:none;
    }
    .cell:hover:not(.filled) { background:var(--surface2); }
    .cell.filled { cursor:default; }
    .cell.win-cell { background:rgba(0,255,136,0.09); }
    .cell-x { color:var(--x-color); text-shadow:0 0 18px rgba(255,51,102,0.45); }
    .cell-o { color:var(--o-color); text-shadow:0 0 18px rgba(0,204,255,0.45); }
    @keyframes pop { 0%{transform:scale(0.4);opacity:0} 60%{transform:scale(1.18)} 100%{transform:scale(1);opacity:1} }
    .cell-value { animation:pop 0.2s ease-out forwards; display:block; }

    /* ── STATUS ── */
    .status-bar {
      width:100%; max-width:520px; text-align:center; padding:0.7rem;
      background:var(--surface); border:1px solid var(--border); border-radius:2px; margin-bottom:0.9rem;
    }
    .status-text { font-size:0.77rem; letter-spacing:0.15em; text-transform:uppercase; }
    .st-your-turn   { color:var(--accent); }
    .st-wait        { color:var(--muted); }
    .st-win         { color:var(--accent); }
    .st-lose        { color:var(--accent2); }
    .st-draw        { color:var(--o-color); }
    .st-waiting-p   { color:var(--muted); }
    .game-buttons { display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap; }

    .waiting-room { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; text-align:center; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spin { animation:spin 2.5s linear infinite; font-size:2.5rem; display:inline-block; margin-bottom:1rem; }

    /* ── SHARE BOX ── */
    .share-box {
      max-width:520px; width:100%; margin-bottom:1rem;
      background:var(--surface); border:1px solid var(--border); border-radius:2px;
      padding:1rem 1.25rem; text-align:center;
    }
    .share-label { font-size:0.62rem; letter-spacing:0.2em; color:var(--muted); margin-bottom:0.4rem; }
    .share-code {
      font-family:var(--font-display); font-size:2.8rem; letter-spacing:0.3em;
      background:linear-gradient(135deg,var(--accent),#00ccff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .share-hint { font-size:0.62rem; color:var(--muted); letter-spacing:0.15em; cursor:pointer; margin-top:0.25rem; }
    .share-hint:hover { color:var(--accent); }

    /* ── TOASTS ── */
    .toast-container { position:fixed; bottom:1.5rem; right:1.5rem; display:flex; flex-direction:column; gap:0.45rem; z-index:9999; }
    .toast {
      background:var(--surface2); border:1px solid var(--border); border-radius:2px;
      padding:0.55rem 1rem; font-size:0.72rem; letter-spacing:0.04em;
      animation:slideIn 0.25s ease-out; max-width:260px;
    }
    @keyframes slideIn { from{transform:translateX(110%);opacity:0} to{transform:translateX(0);opacity:1} }

    .divider { display:flex; align-items:center; gap:1rem; margin:1.25rem 0; color:var(--muted); font-size:0.68rem; letter-spacing:0.15em; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }

    /* loading overlay */
    .loading-screen { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1rem; }
    .loading-logo { font-family:var(--font-display); font-size:3rem; letter-spacing:0.1em; color:var(--muted); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { createClient } = supabase;

// ─── SUPABASE ─────────────────────────────────────────────────────────────
const DB = createClient(
  "https://xhdvsrpediosbblvbgbo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoZHZzcnBlZGlvc2JibHZiZ2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NDU2NTgsImV4cCI6MjA5NDQyMTY1OH0.LNw9DuCD5EBBD0h2Y6UYYkZlUSZbewLk9d8UCje88OM"
);

// ─── UTILS ────────────────────────────────────────────────────────────────
function checkWinner(board) {
  const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for (const [a,b,c] of lines) {
    if (board[a] && board[a]===board[b] && board[a]===board[c])
      return { winner:board[a], line:[a,b,c] };
  }
  if (board.every(Boolean)) return { winner:"draw", line:[] };
  return null;
}
function genId() { return Math.random().toString(36).slice(2,8).toUpperCase(); }

// ─── TOAST ────────────────────────────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = msg => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, {id, msg}]);
    setTimeout(() => setToasts(t => t.filter(x => x.id!==id)), 3200);
  };
  return { toasts, add };
}
function Toasts({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => <div key={t.id} className="toast">{t.msg}</div>)}
    </div>
  );
}

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────
// Uses Supabase Auth (email-less: username@game.local trick) + profiles table for unique username
function AuthScreen({ onAuth }) {
  const [mode, setMode]       = useState("login");   // "login" | "signup"
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState("");

  // Convert username → fake email for Supabase Auth
  const toEmail = u => `${u.toLowerCase().trim()}@xo.game`;

  async function handleSignup() {
    setError(""); setLoading(true);
    const u = username.trim();
    if (!u || u.length < 3) { setError("Username must be at least 3 characters."); setLoading(false); return; }
    if (!/^[a-zA-Z0-9_]+$/.test(u)) { setError("Only letters, numbers, underscores."); setLoading(false); return; }
    if (password.length < 6)  { setError("Password must be at least 6 characters."); setLoading(false); return; }

    // Check username taken (case-insensitive via profiles table)
    const { data: existing } = await DB.from("profiles").select("id").eq("username", u.toLowerCase()).maybeSingle();
    if (existing) { setError("Username already taken. Try another."); setLoading(false); return; }

    const { data, error: signErr } = await DB.auth.signUp({ email: toEmail(u), password });
    if (signErr) { setError(signErr.message); setLoading(false); return; }

    // Insert profile with username
    await DB.from("profiles").insert({ id: data.user.id, username: u.toLowerCase(), display_name: u });

    onAuth({ id: data.user.id, username: u.toLowerCase(), display_name: u });
  }

  async function handleLogin() {
    setError(""); setLoading(true);
    const u = username.trim();
    if (!u || !password) { setError("Please fill in all fields."); setLoading(false); return; }

    const { data, error: loginErr } = await DB.auth.signInWithPassword({ email: toEmail(u), password });
    if (loginErr) { setError("Invalid username or password."); setLoading(false); return; }

    // Fetch profile
    const { data: profile } = await DB.from("profiles").select("*").eq("id", data.user.id).single();
    onAuth({ id: data.user.id, username: profile?.username || u.toLowerCase(), display_name: profile?.display_name || u });
  }

  function handleKey(e) { if (e.key==="Enter") mode==="login" ? handleLogin() : handleSignup(); }

  return (
    <div className="auth-screen">
      <div className="auth-card">
        <div className="logo">X ✕ O</div>
        <div className="logo-sub">MULTIPLAYER · REALTIME · SUPABASE</div>

        <div className="auth-tabs">
          <button className={`auth-tab ${mode==="login"?"active":""}`} onClick={()=>{setMode("login");setError("");}}>LOGIN</button>
          <button className={`auth-tab ${mode==="signup"?"active":""}`} onClick={()=>{setMode("signup");setError("");}}>SIGN UP</button>
        </div>

        {error && <div className="error-box">{error}</div>}

        <div className="field-group">
          <label className="field-label">Username</label>
          <input className="field" placeholder="e.g. NeonFox" value={username}
            onChange={e=>setUsername(e.target.value)} onKeyDown={handleKey} autoComplete="username" spellCheck={false}/>
        </div>
        <div className="field-group">
          <label className="field-label">Password</label>
          <input className="field" type="password" placeholder="••••••••" value={password}
            onChange={e=>setPassword(e.target.value)} onKeyDown={handleKey} autoComplete={mode==="login"?"current-password":"new-password"}/>
        </div>

        <button className="btn btn-primary" style={{width:"100%",marginTop:"0.5rem"}}
          onClick={mode==="login" ? handleLogin : handleSignup} disabled={loading}>
          {loading ? "…" : mode==="login" ? "LOGIN" : "CREATE ACCOUNT"}
        </button>

        <div className="divider">{mode==="login" ? "NO ACCOUNT?" : "HAVE AN ACCOUNT?"}</div>
        <button className="btn btn-secondary" style={{width:"100%"}}
          onClick={()=>{setMode(mode==="login"?"signup":"login");setError("");}}>
          {mode==="login" ? "SIGN UP" : "LOGIN"}
        </button>
      </div>
    </div>
  );
}

// ─── LOBBY ────────────────────────────────────────────────────────────────
function Lobby({ player, onJoinRoom, onLogout, toast }) {
  const [rooms, setRooms]     = useState([]);
  const [tab, setTab]         = useState("all");
  const [newName, setNewName] = useState("");
  const [creating, setCreating] = useState(false);

  useEffect(() => {
    let sub;
    async function init() {
      const { data } = await DB.from("rooms").select("*").order("created_at", { ascending: false });
      setRooms(data || []);
      sub = DB.channel("rooms-lobby-v2")
        .on("postgres_changes", { event:"*", schema:"public", table:"rooms" }, payload => {
          setRooms(prev => {
            if (payload.eventType==="INSERT") return [payload.new, ...prev];
            if (payload.eventType==="DELETE") return prev.filter(r => r.id!==payload.old.id);
            if (payload.eventType==="UPDATE") return prev.map(r => r.id===payload.new.id ? payload.new : r);
            return prev;
          });
        })
        .subscribe();
    }
    init();
    return () => { sub && DB.removeChannel(sub); };
  }, []);

  async function createRoom() {
    setCreating(true);
    const id = genId();
    const { error } = await DB.from("rooms").insert({
      id, name: newName.trim() || `${player.display_name}'s Room`,
      host_id: player.id, host_name: player.display_name,
      guest_id: null, guest_name: null,
      board: Array(9).fill(null),
      current_turn: "X", winner: null, status: "inactive"
    });
    setCreating(false);
    if (error) { toast.add("❌ Failed to create room"); return; }
    setNewName("");
    onJoinRoom(id, "host");
  }

  async function joinRoom(room) {
    if (room.guest_id) { toast.add("Room is full"); return; }
    const { error } = await DB.from("rooms").update({
      guest_id: player.id, guest_name: player.display_name, status: "playing"
    }).eq("id", room.id);
    if (error) { toast.add("❌ Failed to join"); return; }
    onJoinRoom(room.id, "guest");
  }

  async function deleteRoom(room) {
    if (room.host_id !== player.id) { toast.add("Only the host can delete this room"); return; }
    await DB.from("rooms").delete().eq("id", room.id);
    toast.add("🗑 Room deleted");
  }

  async function handleLogout() {
    await DB.auth.signOut();
    onLogout();
  }

  // Tab filters
  const myRooms       = rooms.filter(r => r.host_id===player.id);
  const readyRooms    = rooms.filter(r => !r.guest_id && !r.winner && r.host_id!==player.id);
  const inactiveRooms = rooms.filter(r => r.winner || (r.guest_id && r.status!=="playing"));
  const displayRooms  =
    tab==="all"      ? rooms :
    tab==="ready"    ? readyRooms :
    tab==="inactive" ? inactiveRooms :
    myRooms;

  function StatusPill({ room }) {
    if (room.host_id===player.id)
      return <span className="room-status s-mine">YOUR ROOM</span>;
    if (room.winner)
      return <span className="room-status s-inactive">FINISHED</span>;
    if (!room.guest_id)
      return <span className="room-status s-ready">WAITING</span>;
    return <span className="room-status s-playing">IN GAME</span>;
  }

  function RoomActions({ room }) {
    const isHost  = room.host_id===player.id;
    const isGuest = room.guest_id===player.id;
    if (isHost) return (
      <>
        <button className="btn btn-secondary btn-sm" onClick={()=>onJoinRoom(room.id,"host")}>OPEN</button>
        <button className="btn-icon" title="Delete room" onClick={()=>deleteRoom(room)}>🗑</button>
      </>
    );
    if (isGuest) return <button className="btn btn-secondary btn-sm" onClick={()=>onJoinRoom(room.id,"guest")}>REJOIN</button>;
    if (!room.guest_id && !room.winner) return <button className="btn btn-primary btn-sm" onClick={()=>joinRoom(room)}>JOIN</button>;
    return <span style={{fontSize:"0.65rem",color:"var(--muted)"}}>FULL</span>;
  }

  return (
    <div className="lobby">
      <div className="lobby-header">
        <div className="lobby-title">LOBBY</div>
        <div className="player-badge">
          <div className="player-badge-inner">
            <div className="player-dot"/>
            <span style={{fontSize:"0.78rem"}}>{player.display_name}</span>
          </div>
          <button className="btn btn-secondary btn-sm" onClick={handleLogout}>LOGOUT</button>
        </div>
      </div>

      <div className="create-room-bar">
        <input className="field" style={{flex:1}} placeholder="Room name (optional)…"
          value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createRoom()}/>
        <button className="btn btn-primary" onClick={createRoom} disabled={creating}>
          {creating ? "…" : "+ CREATE ROOM"}
        </button>
      </div>

      <div className="tabs">
        {[
          { k:"all",      label:"All Rooms",     count: rooms.length },
          { k:"ready",    label:"Ready to Play", count: readyRooms.length },
          { k:"inactive", label:"Inactive",       count: inactiveRooms.length },
          { k:"mine",     label:"Your Rooms",    count: myRooms.length },
        ].map(t => (
          <button key={t.k} className={`tab ${tab===t.k?"active":""}`} onClick={()=>setTab(t.k)}>
            {t.label} <span className="tab-badge">{t.count}</span>
          </button>
        ))}
      </div>

      <div className="rooms-list">
        {displayRooms.length===0 ? (
          <div className="empty-state">
            <div className="empty-icon">◻</div>
            <div>{tab==="mine" ? "YOU HAVEN'T CREATED ANY ROOMS YET" : "NO ROOMS HERE"}</div>
            <div style={{marginTop:"0.5rem",opacity:0.45}}>
              {tab==="mine" ? "Hit + CREATE ROOM to start" : "Check another tab or create one"}
            </div>
          </div>
        ) : displayRooms.map(room => (
          <div key={room.id} className={`room-card ${room.host_id===player.id?"is-mine":!room.guest_id&&!room.winner?"ready":"inactive"}`}>
            <div className="room-id">{room.id}</div>
            <div className="room-info">
              <div className="room-name">{room.name}</div>
              <div className="room-meta">
                {room.host_name}{room.guest_name ? ` vs ${room.guest_name}` : " · waiting for opponent"}
              </div>
            </div>
            <StatusPill room={room}/>
            <div className="room-actions"><RoomActions room={room}/></div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── GAME ROOM ────────────────────────────────────────────────────────────
function GameRoom({ roomId, player, role, onLeave, toast }) {
  const [room, setRoom] = useState(null);
  const subRef = useRef(null);

  useEffect(() => {
    async function init() {
      const { data } = await DB.from("rooms").select("*").eq("id", roomId).single();
      setRoom(data);
      subRef.current = DB.channel(`room-${roomId}-v2`)
        .on("postgres_changes", { event:"UPDATE", schema:"public", table:"rooms", filter:`id=eq.${roomId}` },
          p => setRoom(p.new))
        .on("postgres_changes", { event:"DELETE", schema:"public", table:"rooms", filter:`id=eq.${roomId}` },
          () => { toast.add("Room was deleted by host"); onLeave(); })
        .subscribe();
    }
    init();
    return () => { subRef.current && DB.removeChannel(subRef.current); };
  }, [roomId]);

  async function makeMove(idx) {
    if (!room) return;
    const sym = role==="host" ? "X" : "O";
    if (room.current_turn!==sym || room.board[idx] || room.winner || !room.guest_id) return;
    const nb = [...room.board]; nb[idx]=sym;
    const res = checkWinner(nb);
    await DB.from("rooms").update({
      board: nb,
      current_turn: sym==="X" ? "O" : "X",
      winner: res ? res.winner : null,
    }).eq("id", roomId);
  }

  async function resetGame() {
    await DB.from("rooms").update({ board:Array(9).fill(null), current_turn:"X", winner:null }).eq("id", roomId);
  }

  async function deleteAndLeave() {
    await DB.from("rooms").delete().eq("id", roomId);
    onLeave();
  }

  if (!room) return (
    <div className="waiting-room">
      <span className="spin">⟳</span>
      <div style={{color:"var(--muted)",fontSize:"0.75rem",letterSpacing:"0.2em"}}>LOADING…</div>
    </div>
  );

  const sym = role==="host" ? "X" : "O";
  const res = checkWinner(room.board);
  const winLine = res?.line || [];
  const isMyTurn = !room.winner && room.guest_id && room.current_turn===sym;

  let sClass="st-wait", sMsg="";
  if (!room.guest_id)            { sClass="st-waiting-p"; sMsg="WAITING FOR OPPONENT…"; }
  else if (room.winner==="draw") { sClass="st-draw";      sMsg="IT'S A DRAW"; }
  else if (room.winner===sym)    { sClass="st-win";       sMsg="YOU WIN! 🏆"; }
  else if (room.winner)          { sClass="st-lose";      sMsg="YOU LOSE"; }
  else if (isMyTurn)             { sClass="st-your-turn"; sMsg="YOUR TURN"; }
  else { sClass="st-wait"; sMsg=`${room.current_turn==="X"?room.host_name:room.guest_name||"Opponent"}'s TURN`; }

  return (
    <div className="game-room">
      <div className="game-header">
        <div className="room-code">ROOM <span>{room.id}</span></div>
        <button className="btn btn-secondary btn-sm" onClick={onLeave}>← LOBBY</button>
      </div>

      {!room.guest_id && (
        <div className="share-box">
          <div className="share-label">SHARE THIS CODE WITH YOUR OPPONENT</div>
          <div className="share-code">{room.id}</div>
          <div className="share-hint" onClick={()=>{navigator.clipboard.writeText(room.id);toast.add("📋 Room code copied!");}}>
            TAP TO COPY
          </div>
        </div>
      )}

      <div className="players-display">
        <div className="player-slot">
          <div className="player-symbol x-symbol">X</div>
          <div className={`pname ${role==="host"?"you":""}`}>{room.host_name}{role==="host"?" (you)":""}</div>
        </div>
        <div className="vs-divider">VS</div>
        <div className="player-slot">
          <div className="player-symbol o-symbol">O</div>
          <div className={`pname ${room.guest_id?(role==="guest"?"you":""):"waiting"}`}>
            {room.guest_name||"Waiting…"}{role==="guest"?" (you)":""}
          </div>
        </div>
      </div>

      <div className="board">
        {(room.board||Array(9).fill(null)).map((cell,i) => (
          <div key={i} className={`cell ${cell?"filled":""} ${winLine.includes(i)?"win-cell":""}`}
            onClick={()=>makeMove(i)}>
            {cell && <span className={`cell-value ${cell==="X"?"cell-x":"cell-o"}`}>{cell}</span>}
          </div>
        ))}
      </div>

      <div className="status-bar">
        <div className={`status-text ${sClass}`}>{sMsg}</div>
      </div>

      <div className="game-buttons">
        {room.winner && role==="host" && (
          <button className="btn btn-secondary" onClick={resetGame}>PLAY AGAIN</button>
        )}
        {role==="host" && (
          <button className="btn btn-danger" onClick={deleteAndLeave}>DELETE ROOM</button>
        )}
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen]   = useState("loading");
  const [player, setPlayer]   = useState(null);
  const [gameInfo, setGameInfo] = useState(null);
  const toast = useToast();

  // Check if already logged in
  useEffect(() => {
    async function checkSession() {
      const { data: { session } } = await DB.auth.getSession();
      if (session) {
        const { data: profile } = await DB.from("profiles").select("*").eq("id", session.user.id).single();
        if (profile) {
          setPlayer({ id: session.user.id, username: profile.username, display_name: profile.display_name });
          setScreen("lobby");
          return;
        }
      }
      setScreen("auth");
    }
    checkSession();
  }, []);

  function handleAuth(playerData) {
    setPlayer(playerData);
    setScreen("lobby");
  }

  function handleLogout() {
    setPlayer(null);
    setGameInfo(null);
    setScreen("auth");
  }

  return (
    <div className="app">
      {screen==="loading" && (
        <div className="loading-screen">
          <div className="loading-logo">X ✕ O</div>
          <span className="spin" style={{fontSize:"1.5rem",color:"var(--muted)"}}>⟳</span>
        </div>
      )}
      {screen==="auth" && <AuthScreen onAuth={handleAuth}/>}
      {screen==="lobby" && player && (
        <Lobby player={player}
          onJoinRoom={(id,role)=>{ setGameInfo({roomId:id,role}); setScreen("game"); }}
          onLogout={handleLogout}
          toast={toast}/>
      )}
      {screen==="game" && player && gameInfo && (
        <GameRoom roomId={gameInfo.roomId} player={player} role={gameInfo.role}
          onLeave={()=>setScreen("lobby")} toast={toast}/>
      )}
      <Toasts toasts={toast.toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
