<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Tic-Tac-Toe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .cell { transition: all 0.2s ease; }
        .cell:hover:not(:disabled) { transform: scale(1.02); background-color: #f3f4f6; }
        .winner-line { animation: strike 0.5s ease-out forwards; }
        @keyframes strike { from { width: 0; } to { width: 100%; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

   <div id="app" class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
    <!-- Setup Screen -->
    <div id="setup-screen" class="space-y-6">
        <h1 class="text-3xl font-extrabold text-center">Supabase PvP</h1>
        <input type="text" id="game-id-input" placeholder="Room Name" class="w-full px-4 py-3 border rounded-xl">
        <button id="join-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">Join Game</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden space-y-6">
        <div class="flex justify-between text-sm font-bold text-slate-500 uppercase">
            <span id="room-id-display"></span>
            <span id="role-display" class="text-blue-600"></span>
        </div>
        <div id="status-message" class="text-center p-2 bg-blue-50 text-blue-700 rounded-lg">Connecting...</div>
        <div id="board" class="grid grid-cols-3 gap-3">
            <!-- Cells generated by JS -->
        </div>
        <button id="reset-btn" class="w-full bg-slate-800 text-white py-3 rounded-xl">Reset</button>
    </div>
</div>

<script>
    // Use the variables injected by Vercel in your actual production build
    // For local testing, you would replace these with your actual keys
    const SUPABASE_URL = 'https://xhdvsrpediosbblvbgbo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_FHWeXKIwRbXItp8-6AkxTw_V7CzG5Rz';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let myUserId = null;
    let currentGameId = null;
    let myRole = null; 
    let channel = null;

    async function init() {
        // 1. Sign in anonymously
        const { data: { user } } = await supabase.auth.signInAnonymously();
        myUserId = user.id;

        document.getElementById('join-btn').onclick = joinGame;
    }

    async function joinGame() {
        const gameId = document.getElementById('game-id-input').value.trim();
        if (!gameId) return;
        currentGameId = gameId;

        // 2. Try to fetch the game
        let { data: game } = await supabase.from('games').select('*').eq('id', gameId).single();

        if (!game) {
            // Create game as Player X
            await supabase.from('games').insert({ id: gameId, player_x: myUserId, status: 'waiting' });
            myRole = 'X';
        } else {
            if (game.player_x === myUserId) myRole = 'X';
            else if (!game.player_o || game.player_o === myUserId) {
                myRole = 'O';
                await supabase.from('games').update({ player_o: myUserId, status: 'playing' }).eq('id', gameId);
            } else {
                alert("Room full!"); return;
            }
        }

        setupUI();
        subscribeToChanges();
    }

    function subscribeToChanges() {
        // 3. Realtime subscription
        channel = supabase
            .channel(`game:${currentGameId}`)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'games', filter: `id=eq.${currentGameId}` }, 
            payload => {
                renderBoard(payload.new);
            })
            .subscribe();
        
        // Initial fetch to render
        fetchState();
    }

    async function fetchState() {
        const { data } = await supabase.from('games').select('*').eq('id', currentGameId).single();
        renderBoard(data);
    }

    async function makeMove(index, currentBoard, currentTurn) {
        if (currentTurn !== myRole || currentBoard[index] !== "") return;
        
        const nextBoard = [...currentBoard];
        nextBoard[index] = myRole;
        const nextTurn = myRole === 'X' ? 'O' : 'X';

        await supabase.from('games')
            .update({ board: nextBoard, turn: nextTurn })
            .eq('id', currentGameId);
    }

    function renderBoard(game) {
        const boardDiv = document.getElementById('board');
        boardDiv.innerHTML = '';
        game.board.forEach((cell, i) => {
            const btn = document.createElement('button');
            btn.className = `cell text-3xl font-bold rounded-2xl bg-slate-100 ${cell === 'X' ? 'text-blue-600' : 'text-red-600'}`;
            btn.innerText = cell;
            btn.disabled = cell !== "" || game.turn !== myRole || game.status === 'waiting';
            btn.onclick = () => makeMove(i, game.board, game.turn);
            boardDiv.appendChild(btn);
        });
        document.getElementById('status-message').innerText = game.status === 'waiting' ? 'Waiting for opponent...' : `Turn: ${game.turn}`;
    }

    function setupUI() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('room-id-display').innerText = `Room: ${currentGameId}`;
        document.getElementById('role-display').innerText = `You are ${myRole}`;
    }

    init();
</script>
</body>
</html>
